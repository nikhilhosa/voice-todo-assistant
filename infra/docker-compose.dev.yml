

services:
  postgres:
    image: postgres:15
    container_name: voice_postgres
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: voiceapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: voice_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
